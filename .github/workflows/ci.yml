name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: go test ./...
      - run: go test -race ./intel ./lsp
      - run: go vet ./...

  parity:
    runs-on: ubuntu-latest
    if: ${{ vars.BEND_PARITY_PATH != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: go test -tags='cgo parity' ./internal/cparity
      - run: ./tools/run-bend-parity.sh "${{ vars.BEND_PARITY_PATH }}"

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
      - run: ./tools/wasm-smoke.sh
